{# PeriDocs/app/templates/account-setup.html save-state 2026-05-11T15:36:27-04:00 #}
{% extends "base.html" %}
{% block content %}

<div class="card-grid">
  <div class="card">

    <h1>Create An Account</h1>

    <div class="card-content">

      <input class="typeahead-dropdown typeahead-item" id="username" type="text" placeholder="username" />

      <div style="height:10px"></div>

      <input class="typeahead-dropdown typeahead-item" id="password" type="password" placeholder="password" />

      <div style="height:20px"></div>

      <button class="general-button" id="create-account-btn">
        Create Account
      </button>

      <!-- TOTP DISPLAY -->
      <div id="totp-section" style="display:none; margin-top:20px;">

        <p><strong>Save this TOTP secret:</strong></p>
        <div class="excerpt" id="totp-secret"></div>

        <p style="margin-top:10px;"><strong>Manual setup URI:</strong></p>
        <div class="excerpt" id="totp-uri"></div>

        <!-- FIX: hide initially -->
        <img id="qr" style="margin-top:15px; display:none;" />

        <br>

        <input
          id="setup-totp-code"
          type="text"
          placeholder="Enter current TOTP code"
        />

        <div style="height:10px"></div>

        <button class="general-button" id="complete-account-creation-btn">
          Verify & Create Account
        </button>

      </div>

    </div>

  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script src="/static/account-setup-responsiveness.js"></script>
{% endblock %}
