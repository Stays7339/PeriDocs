  Description: Homepage for the prototype of Peridocs. The only page where users can have their text analyzed by the Peridocs algorithm.

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PeriDocs Prototype</title>
  <!-- Cabinet Grotesk from Fontshare -->
  <link href="https://api.fontshare.com/css?f[]=cabinet-grotesk@400,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Jot your thoughts. Join the conversation.</h1>
      <form action="/submit" method="post">
        <textarea name="text" rows="10" placeholder="We do not share or sell any of your identifiable user data. We're here to listen..."></textarea>
        <div class="meta">
          <button type="submit" class="primary">Analyze & Search</button>
        </div>
      </form>

      <footer>
        <p>We keep your text private by default. See our <a href="/privacy">privacy & data policy</a>.</p>
        <p>
          <a href="/about">Contact</a> |
          <a href="/terms-of-service">Terms of Service</a> |
          <a href="/privacy-policy">Privacy Policy</a> |
          <a href="/about">About</a>
        </p>
      </footer>
    </div>
  </div>
</body>
</html>
