<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PeriDocs Prototype</title>

<!-- Import Cabinet Grotesk font -->
<link rel="stylesheet" href="https://api.fontshare.com/css?f[]=cabinet-grotesk@400,700&display=swap">

<style>
  /* --- Reset & base styles --- */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    font-family: 'Cabinet Grotesk', sans-serif;
    background-color: #f0f0eb; /* fallback */
    background-image: url('/static/olga-thelavart-vS3idIiYxX0-unsplash-medium-size.jpg'); /* replace with your resized image */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: #2c2c2c; /* neutral dark text */
    line-height: 1.5;
  }

  /* Text selection color */
  ::selection {
    background: #bfc8cc;
    color: #2c2c2c;
  }

  /* --- Header / hamburger menu --- */
  header {
    display: flex;
    justify-content: flex-end;
    padding: 1rem;
  }

  .hamburger {
    background-color: #bfc1dd;
    border: none;
    padding: 0.5rem 0.75rem;
    cursor: pointer;
    font-size: 1.2rem;
    border-radius: 0.25rem;
  }

  /* --- Main content --- */
  main {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 120px); /* account for header + footer */
    padding: 2rem;
  }

  form {
    background-color: rgba(255, 255, 255, 0.9); /* slightly translucent white */
    padding: 2rem;
    border-radius: 0.5rem;
    max-width: 600px;
    width: 100%;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }

  textarea {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #bfc8cc;
    border-radius: 0.25rem;
    resize: vertical;
    font-family: inherit;
    font-size: 1rem;
  }

  button {
    margin-top: 1rem;
    background-color: #bfc1dd;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 0.25rem;
    cursor: pointer;
    font-weight: bold;
  }

  button:hover {
    background-color: #aab0d2;
  }

  /* --- Footer --- */
  footer {
    background-color: #bfc1dd;
    padding: 1rem 2rem;
    text-align: center;
    font-size: 0.9rem;
    color: #2c2c2c;
  }

  footer a {
    color: #2c2c2c;
    text-decoration: none;
    margin: 0 0.5rem;
  }

  footer a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<header>
  <button class="hamburger">☰</button>
</header>

<main>
  <form action="/submit" method="post">
    <h1>Jot your thoughts. Join the  conversation. We do not collect, share, or sell any of your indentifiable user data.</h1>
    <textarea name="text" rows="10" placeholder="Type your text here..."></textarea>
    <button type="submit">Analyze & Save</button>
  </form>
</main>

<footer>
  <a href="#">Contact</a>|
  <a href="#">Terms of Service</a>|
  <a href="#">Privacy Policy</a>|
  <a href="#">About</a>
</footer>

</body>
</html>
