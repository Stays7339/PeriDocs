<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry saved — PeriDocs</title>
  <!-- Cabinet Grotesk from Fontshare -->
  <link href="https://api.fontshare.com/css?f[]=cabinet-grotesk@400,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <div class="card" role="main" aria-labelledby="saved-heading">
      <div class="id">Saved • ID <strong>{{ entry_id }}</strong></div>
      <h1 id="saved-heading">Your entry is safely stored</h1>

      <p class="mirror">{{ paraphrase }}</p>

      <div>
        <div class="excerpt">
          {{ matched_excerpt }}
        </div>
        <div class="source">Matched editorial: <strong>{{ matched_source_id }}</strong></div>
      </div>

      <div class="meta">
        <a class="btn primary" href="/save/{{ entry_id }}">Save this entry (private)</a>
        <a class="btn ghost" href="/">Return</a>
      </div>
       <footer>
  <p class="inline-links">
    We keep your text private by default. See our <a href="/privacy">privacy & data policy</a>.
  </p>
  <p class="nav-links">
    <a href="#">Contact</a> | 
    <a href="#">Terms of Service</a> | 
    <a href="#">Privacy Policy</a> | 
    <a href="#">About</a>
  </p>
</footer>
    </div>
  </div>
</body>
</html>
