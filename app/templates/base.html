<!doctype html>
<html lang="en">
<head>
  <link rel="preload" as="image" href="/static/peridocs-wordmark-and-logo-v2.png">
  <link rel="preload" as="image" href="/static/museum-of-new-zealand-te-papa-tongarewa-1C7oRRwUkgU-unsplash-lighter.png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>PeriDocs</title>

  <!-- Global styles (must be loaded first) -->
  <link rel="stylesheet" href="/static/globals.css" />
  <link rel="stylesheet" href="/static/styleguide.css" />
  <link rel="stylesheet" href="/static/stylesheet.css" />
</head>



<body>
<!-- ADDED: required for peridocs-ui.js toast system -->
<div id="general-toast-container"></div>
  <!-- =========================
       HEADER (fixed, translucent, always present)
  ========================== -->
  <header>

    <!-- LEFT: LOGO -->
    <div class="header-left">
      <a class="header-logo" href="/">
        <!-- replace with your svg or img -->
        <img src="/static/peridocs-wordmark-and-logo-v2.png" alt="PeriDocs Logo" height="40"/>
      </a>
    </div>

    <!-- CENTER: MENU BAR -->
    <nav class="header-center" aria-label="Primary navigation">
        <div class="header-center-inner">

      <div class="menu-group-left">
        <a class="menu-button" href="/about">About</a>
        <a class="menu-button" href="https://github.com/Stays7339/PeriDocs" target="_blank" rel="noopener noreferrer">Open Source</a>
        <a class="menu-button" title="For universities, labs, and partner organizations">Institutions</a>
        </div>

    <div class="header-center-spine"></div>

      <div class="menu-group-right">
        <a class="menu-button" title="Planned Feature For Future Release">User Guide</a>
        <a class="menu-button" href="https://donate.stripe.com/dRmbJ2fdH94MckI9Mhe7m00" target="_blank" rel="noopener noreferrer">Contribution</a>
        <a class="menu-button" title="Planned Feature For Future Release">Login / Signup</a>
      </div>

      </div>

    </nav>

    <!-- RIGHT: ACTION AREA -->
    <div class="header-right">

    <button class="header-hamburger-button" aria-label="Menu">
    ☰
    </button>

      <!-- SVG icon layer (decorative or interactive depending on your intent) -->
      <img class="header-svg-layer" src="/static/fi-rr-search-alt.svg" alt="" />

      <!-- Button under SVG z-layer -->
      <a class="header-action-button" href="/create-entry" aria-label="Primary Action">
</a>

    </div>

  </header>


  <!-- =========================
       PAGE CONTENT SLOT
       (sits under fixed translucent header)
  ========================== -->
  <main class="page-content">
    {% block content %}{% endblock %}
  </main>

  <script>
function updateNavPill() {
  const left = document.querySelector(".menu-group-left");
  const right = document.querySelector(".menu-group-right");
  const header = document.querySelector(".header-center");

  if (!left || !right || !header) return;

  const headerRect = header.getBoundingClientRect();
  const leftRect = left.getBoundingClientRect();
  const rightRect = right.getBoundingClientRect();

  // left edge of left group relative to header
  const leftEdge = leftRect.left - headerRect.left;

  // right edge of right group relative to header
  const rightEdge = rightRect.right - headerRect.left;

  const width = rightEdge - leftEdge;

  // write to CSS variables
  header.style.setProperty("--nav-pill-left", `${leftEdge}px`);
  header.style.setProperty("--nav-pill-width", `${width}px`);
}

window.addEventListener("load", updateNavPill);
window.addEventListener("resize", updateNavPill);
</script>

<!-- ADDED: brings in existing UI system (toasts, etc.) -->
<script src="/static/peridocs-ui.js"></script>
<script src="/static/donation-ui.js"></script>

</body>
</html>
