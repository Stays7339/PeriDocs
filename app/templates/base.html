<!doctype html>
<html lang="en">
<head>
  <link rel="preload" as="image" href="/static/peridocs-wordmark-and-logo-v2.png">
  <link rel="preload" as="image" href="/static/museum-of-new-zealand-te-papa-tongarewa-1C7oRRwUkgU-unsplash-lighter.png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{% block title %}PeriDocs{% endblock %}</title>

  <!-- Global styles (must be loaded first) -->
  <link rel="stylesheet" href="/static/globals.css" />
  <link rel="stylesheet" href="/static/styleguide.css" />
  <link rel="stylesheet" href="/static/stylesheet.css" />
</head>

<!-- ADDED: mobile menu overlay -->
<div class="mobile-menu-overlay" id="mobileMenuOverlay">
  <nav class="mobile-menu-panel" aria-label="Mobile navigation">
    <!-- we reuse the SAME menu HTML via JS clone -->
  </nav>
</div>



<body>
<!-- required for peridocs-ui.js toast system -->
<div id="general-toast-container"></div>
<div id="privacy-toast"></div>
  <!-- =========================
       HEADER (fixed, translucent, always present)
  ========================== -->
  <header>

    <!-- LEFT: LOGO -->
    <div class="header-left">
      <a class="header-logo" href="/">
        <!-- replace with your svg or img -->
        <img src="/static/peridocs-wordmark-and-logo-v2.png" alt="PeriDocs Logo" height="40"/>
      </a>
    </div>

    <!-- CENTER: MENU BAR -->
    <nav class="header-center" aria-label="Primary navigation">
        <div class="header-center-inner">

      <div class="menu-group-left">
        <a class="menu-button" href="/about">About</a>
        <a class="menu-button" href="https://github.com/Stays7339/PeriDocs" target="_blank" rel="noopener noreferrer">Open Source</a>
        <a class="menu-button" href="/terms-of-service">Terms of Service</a>
        </div>

    <div class="header-center-spine"></div>

      <div class="menu-group-right">
        <a class="menu-button" href="/privacy-policy">Privacy Policy</a>
        <a class="menu-button" title="Planned Feature For Future Release">User Guide</a>
        <a class="menu-button" href="/#donate">Donate to PeriDocs</a>
      </div>

      </div>

    </nav>

    <!-- RIGHT: ACTION AREA -->
    <div class="header-right">

    <button class="header-hamburger-button" aria-label="Menu">
      <span class="header-hamburger-icon">☰</span>
    </button>

      <!-- SVG icon layer (decorative or interactive depending on your intent) -->
      <img class="header-svg-layer" src="/static/fi-rr-search-alt.svg" alt="" />

      <!-- Button under SVG z-layer -->
      <a class="header-action-button" href="/create-entry" aria-label="Primary Action">
</a>

    </div>

  </header>


  <!-- =========================
       PAGE CONTENT SLOT
       (sits under fixed translucent header)
  ========================== -->
  <main class="page-content">
    {% block content %}{% endblock %}
  </main>

  <script>
function updateNavPill() {
  const left = document.querySelector(".menu-group-left");
  const right = document.querySelector(".menu-group-right");
  const header = document.querySelector(".header-center");

  if (!left || !right || !header) return;

  const headerRect = header.getBoundingClientRect();
  const leftRect = left.getBoundingClientRect();
  const rightRect = right.getBoundingClientRect();

  // left edge of left group relative to header
  const leftEdge = leftRect.left - headerRect.left;

  // right edge of right group relative to header
  const rightEdge = rightRect.right - headerRect.left;

  const width = rightEdge - leftEdge;

  // write to CSS variables
  header.style.setProperty("--nav-pill-left", `${leftEdge}px`);
  header.style.setProperty("--nav-pill-width", `${width}px`);
}

window.addEventListener("load", updateNavPill);
window.addEventListener("resize", updateNavPill);


// clone existing menu (no duplication of HTML in templates)

const hamburger = document.querySelector(".header-hamburger-button");
const overlay = document.getElementById("mobileMenuOverlay");
const navSource = document.querySelector(".header-center");

function openMobileMenu() {
  if (!overlay || !navSource) return;
  // prevent duplicate rebuilds
  if (overlay.classList.contains("is-open")) return;

  const panel = overlay.querySelector(".mobile-menu-panel");

  
  panel.innerHTML = navSource.innerHTML;

  overlay.classList.add("is-open");
}

function closeMobileMenu() {
  overlay.classList.remove("is-open");
}


function toggleMobileMenu() {
  if (overlay?.classList.contains("is-open")) {
    closeMobileMenu();
  } else {
    openMobileMenu();
  }
}

hamburger?.addEventListener("click", toggleMobileMenu);

overlay?.addEventListener("click", (e) => {
  if (e.target === overlay) closeMobileMenu();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    closeMobileMenu();
  }
});

function forceDesktopCleanup() {
  // close mobile menu
  overlay?.classList.remove("is-open");

  // clear cloned DOM
  const panel = overlay?.querySelector(".mobile-menu-panel");
  if (panel) panel.innerHTML = "";

  // repair nav pill layout
  updateNavPill();
}

const mq = window.matchMedia("(max-aspect-ratio: 175/100)");

let isMobileMode = mq.matches;



mq.addEventListener("change", (e) => {
  const nowMobile = e.matches;

  // ENTERING DESKTOP MODE (THIS is your case)
  if (!nowMobile && isMobileMode) {
    forceDesktopCleanup();
  }

  // ENTERING MOBILE MODE
  if (nowMobile && !isMobileMode) {
    // optional: ensure header state is clean
    updateNavPill();
  }

  isMobileMode = nowMobile;
});

window.addEventListener("resize", () => {
  updateNavPill();

  // optional safety: if we're in desktop mode, ensure no mobile state leaks
  if (!mq.matches) forceDesktopCleanup();
});
</script>

<!-- brings in existing UI system (toasts, etc.) -->
<script src="/static/peridocs-ui.js"></script>
<script src="/static/donation-ui.js"></script>

</body>
</html>
