<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="/static/peridocs-logo-v2.png" type="image/png">
  <title>{% block title %}PeriDocs{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <header class="site-wordmark">
    <a href="/" class="brand-link">
      <img src="/static/peridocs-wordmark-and-logo-202602261328.png" alt="PeriDocs logo" class="brand-logo">
    </a>
  </header>


  <div class="wrap">{% block content %}{% endblock %}</div>

  <button id="theme-toggle-btn" aria-label="Toggle theme">Dark Mode</button>
  <button id="feedback-btn" aria-label="Give feedback">Feedback</button>
  <a id="donate-btn" href="https://donate.stripe.com/dRmbJ2fdH94MckI9Mhe7m00" aria-label="Donate to PeriDocs" target="_blank" rel="noopener noreferrer">
  Donate
  </a>

  {% include 'includes/modal-feedback.html' %}
  {% include 'includes/modal-crisis.html' %}

  <div id="general-toast-container"></div>
  <div id="privacy-toast"></div>

  <script src="/static/peridocs-ui.js" defer></script>

  <canvas id="snow-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10000;display:none;"></canvas>
</body>
</html>
