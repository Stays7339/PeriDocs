{% extends "base.html" %}
{% block content %}

<div class="wrap">
  <div class="card">

    <h1>Bootstrap Admin</h1>

    <div class="card-content">

      <input id="username" type="text" placeholder="admin username" />

      <div style="height:10px"></div>

      <input id="password" type="password" placeholder="admin password" />

      <div style="height:20px"></div>

      <button class="btn primary" onclick="createAdmin()">Create Admin</button>

      <!-- TOTP DISPLAY -->
      <div id="totp-section" style="display:none; margin-top:20px;">

        <p><strong>Save this TOTP secret:</strong></p>
        <div class="excerpt" id="totp-secret"></div>

        <p style="margin-top:10px;"><strong>Manual setup URI:</strong></p>
        <div class="excerpt" id="totp-uri"></div>

        <!-- FIX: hide initially -->
        <img id="qr" style="margin-top:15px; display:none;" />

        <br>

        <input
          id="bootstrap-totp-code"
          type="text"
          placeholder="Enter current TOTP code"
        />

        <div style="height:10px"></div>

        <button class="btn primary" onclick="completeBootstrap()">
          Verify & Create Admin
        </button>

      </div>

    </div>

  </div>
</div>
{% endblock %}

<script>

let pendingBootstrap = null; /* temporary bootstrap state */ 

async function createAdmin() {

  if (pendingBootstrap !== null) {
    showToast(
      "Bootstrap already started.",
      "error"
    );
    return;
  }

  const username =
    document.getElementById("username").value.trim();

  const password =
    document.getElementById("password").value;

  const res = await authFetch("/auth/bootstrap/start", {
    method: "POST",
    credentials: "same-origin",
    headers: authHeaders(),
    body: JSON.stringify({
      username,
      password
    })
  });

  const data = await res.json();

  if (!res.ok) {
    showToast(data.detail || "Bootstrap failed", "error");
    return;
  }

  pendingBootstrap = Object.freeze({
    ticket_id: data.ticket_id,
    username
  });

  document.getElementById("totp-section").style.display = "block";

  document.getElementById("totp-secret").textContent =
    data.time_code_secret;

  const uri =
    `otpauth://totp/PeriDocs:${username}?secret=${data.time_code_secret}&issuer=PeriDocs`;

  document.getElementById("totp-uri").textContent = uri;

  const qr = document.getElementById("qr");

  qr.src =
  "/auth/bootstrap/qr?uri="
  + encodeURIComponent(uri);

  qr.style.display = "block";
}


async function completeBootstrap() {

  if (!pendingBootstrap) {
    showToast("Missing bootstrap session", "error");
    return;
  }

  const password =
    document.getElementById("password").value;

  const time_code =
    document.getElementById("bootstrap-totp-code").value;

  const res = await authFetch("/auth/bootstrap/complete", {
    method: "POST",
    credentials: "same-origin",
    headers: authHeaders(),
    body: JSON.stringify({
      ticket_id: pendingBootstrap.ticket_id,
      password,
      time_code
    })
  });

  const data = await res.json();

  if (!res.ok) {
    showToast(
      data.detail || "Verification failed",
      "error"
    );
    return;
  }

  showToast(
    "Administrator account created",
    "success"
  );

  setTimeout(() => {
    window.location.href = "/admin/auth/login";
  }, 1000);
}

function resetBootstrap() {

  // CLEAR ALL STATE
  pendingBootstrap = null;

  // CLEAR UI
  document.getElementById("totp-section").style.display = "none";
  document.getElementById("totp-secret").textContent = "";
  document.getElementById("totp-uri").textContent = "";
  document.getElementById("qr").style.display = "none";

  // optional: clear inputs
  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
  document.getElementById("bootstrap-totp-code").value = "";
}
</script>
