{% extends "base.html" %}
{% block title %}Admin Review · PeriDocs{% endblock %}

{% block content %}
<div class="card admin-review-card">
  <div class="card-content">
    <h1>Centroid Review</h1>

    {% if flash %}
      <div class="flash-message">{{ flash }}</div>
    {% endif %}

    <!-- ---------------- Swiping Card Interface ---------------- -->
    <div id="review-card-container" class="swipe-card">
      <h2 id="card-title">Loading...</h2>
      <p id="card-summary"></p>
      <ul id="card-meta"></ul>
      <div id="card-details" style="display:none;"></div>

      <button id="read-more-btn" class="btn secondary">Read more</button>
      <button id="approve-btn" class="btn primary">Approve</button>
      <button id="reject-btn" class="btn danger">Reject</button>
    </div>

    <hr>

    <script>
    document.querySelectorAll(".note-input, .label-input").forEach(el=>{
        const counter = document.getElementById((el.classList.contains("note-input")?"note":"label")+"-count-"+el.dataset.suggestionId);
        if(counter) el.addEventListener("input", ()=>{
            counter.textContent = el.value.length+" / "+el.dataset.max+" chars";
        });
    });
    </script>

    <!-- ---------------- Include admin_review.js only here ---------------- -->
    <script src="/static/admin_review.js" defer></script>



</div>
{% endblock %}
