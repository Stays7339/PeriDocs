{% extends "base.html" %}
{% block title %}Admin Review | PeriDocs.org{% endblock %}

{% block content %}
<div class="card">
  <h1>Review Queue</h1>
  <div id="review-list" class="card-content"></div>
</div>

<div class="card">
  <h2>Create Heuristic</h2>

  <div id="givens-container"></div>
  <button class="btn" onclick="addGiven()">+ Add Given</button>

  <hr>

  <div id="outputs-container"></div>
  <button class="btn" onclick="addOutput()">+ Add Output</button>

  <br><br>
  <button class="btn primary" onclick="submitHeuristic()">Submit</button>

  <datalist id="concept-list"></datalist>

  <input list="concept-list" class="input" placeholder="Given concept...">
</div>

<script>
const reviewListContainer = document.getElementById("review-list");
let reviewQueue = [];

async function fetchQueue() {
  const res = await fetch("/admin/review-queue");
  reviewQueue = await res.json();
  renderQueue();

  const params = new URLSearchParams(window.location.search);
  const pid = params.get("precentroid");
  if (pid) openPrecentroid(pid);
}

function renderQueue() {
  reviewListContainer.innerHTML = "";
  reviewQueue.forEach(item => {
    const el = document.createElement("div");
    el.className = "excerpt";
    el.dataset.id = item.id;

    el.innerHTML = `
      <strong class="clickable">${item.id}</strong><br>
      ${item.summary}<br>
      Entries: ${item.meta.entry_count}
      <div style="margin-top:10px;">
        <button class="btn primary expand-btn">View Entries</button>
        <button class="btn primary approve-btn">Approve</button>
        <button class="btn ghost reject-btn">Reject</button>
      </div>
      <div class="entries-container" style="display:none; margin-top:10px;"></div>
    `;

    const expandBtn = el.querySelector(".expand-btn");
    const approveBtn = el.querySelector(".approve-btn");
    const rejectBtn = el.querySelector(".reject-btn");
    const entriesContainer = el.querySelector(".entries-container");
    const clickableTitle = el.querySelector(".clickable");

    // Expand / collapse entries
    expandBtn.addEventListener("click", async () => toggleEntries(item.id));

    clickableTitle.addEventListener("click", () => openPrecentroid(item.id));

    approveBtn.addEventListener("click", async () => {
      const description_from_human_moderator = prompt("Enter description_from_human_moderator:");
      const title_from_human_moderator = prompt("Enter title_from_human_moderator:");
      if (!description_from_human_moderator || !title_from_human_moderator) return;

      await fetch("/admin/approve-precentroid", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: item.id, description_from_human_moderator, title_from_human_moderator })
      });

      fetchQueue();
    });

    rejectBtn.addEventListener("click", async () => {
      await fetch("/admin/reject-precentroid", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: item.id })
      });

      fetchQueue();
    });

    reviewListContainer.appendChild(el);
  });
}

// ---- NEW: toggleEntries ----
async function toggleEntries(precentroidId) {
  const el = [...reviewListContainer.children].find(e => e.dataset.id === precentroidId);
  if (!el) return;

  const entriesContainer = el.querySelector(".entries-container");

  if (entriesContainer.style.display === "block") {
    entriesContainer.style.display = "none"; // collapse
  } else {
    // fetch and show
    const entryIds = reviewQueue.find(p => p.id === precentroidId).meta.entry_ids || [];
    const res = await fetch("/admin/entries-safe-text", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ entry_ids: entryIds })
    });
    const data = await res.json();
    entriesContainer.innerHTML = data.entries.map(e => `<p class="matched-snippet">${e.safe_text}</p>`).join("");
    entriesContainer.style.display = "block";

    // scroll to element
    el.scrollIntoView({ behavior: "smooth" });

    // update URL
    const url = new URL(window.location);
    url.searchParams.set("precentroid", precentroidId);
    history.pushState({ precentroid: precentroidId }, "", url);
  }
}

// Handle back/forward navigation
window.addEventListener("popstate", event => {
  const pid = event.state?.precentroid;
  if (pid) openPrecentroid(pid);
  else reviewQueue.forEach(item => {
    const el = [...reviewListContainer.children].find(e => e.dataset.id === item.id);
    if (el) el.querySelector(".entries-container").style.display = "none";
  });
});

fetchQueue();

// --------------------------------
// Heuristics Loading Javascript
// --------------------------------
const givensContainer = document.getElementById("givens-container");
const outputsContainer = document.getElementById("outputs-container");

function addGiven(value = "") {
  const div = document.createElement("div");
  div.innerHTML = `<input class="input" placeholder="Given concept..." value="${value}">`;
  givensContainer.appendChild(div);
}

function addOutput(concept = "", likelihood = "") {
  const div = document.createElement("div");
  div.innerHTML = `
    <input class="input" placeholder="Output concept..." value="${concept}">
    <input class="input" placeholder="Likelihood (0-1 or %)" value="${likelihood}">
  `;
  outputsContainer.appendChild(div);
}

async function submitHeuristic() {
  const givens = [...givensContainer.querySelectorAll("input")]
    .map(i => i.value.trim())
    .filter(Boolean);

  const outputs = [...outputsContainer.children].map(div => {
    const inputs = div.querySelectorAll("input");
    return {
      concept: inputs[0].value.trim(),
      likelihood: parseFloat(inputs[1].value)
    };
  }).filter(o => o.concept);

  const res = await fetch("/admin/create-heuristic", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ givens, outputs })
  });

  const data = await res.json();
  alert("Heuristic saved");

  // optional reset
  givensContainer.innerHTML = "";
  outputsContainer.innerHTML = "";
}

async function loadConceptList() {
  const res = await fetch("/admin/review-queue");
  const data = await res.json();

  const datalist = document.getElementById("concept-list");

  data.forEach(item => {
    const option = document.createElement("option");
    option.value = item.id;
    datalist.appendChild(option);
  });
}

loadConceptList();
</script>
{% endblock %}
