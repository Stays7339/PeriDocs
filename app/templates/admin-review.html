{% extends "base.html" %}
{% block title %}Admin Review | PeriDocs.org{% endblock %}

{% block content %}
<button class="general-button" onclick="logout()">Logout</button>

<div class="card-grid">
<div class="card">
  <h1>Review Queue</h1>
  <div id="review-list" class="card-content"></div>
</div>

<div class="card">
  <h2>Create Heuristic</h2>

  <div id="givens-container"></div>
  <button class="general-button" onclick="addGiven()">+ Add Given</button>

  <hr>

  <div id="outputs-container"></div>
  <button class="general-button" onclick="addOutput()">+ Add Output</button>

  <br><br>
  <button class="general-button" onclick="submitHeuristic()">Submit</button>

</div>
</div>



<script src="/static/admin_review_ux.js" defer></script>
{% endblock %}
